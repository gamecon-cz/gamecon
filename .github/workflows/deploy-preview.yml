name: Deploy preview environment

# yamllint disable-line rule:truthy
on:
    push:
        branches-ignore:
            - main
            - beta
    pull_request:
        types:
            - closed
    # Branch deleted → tear down its preview. Covers the gap that
    # `pull_request: closed` misses: a branch that got a preview (via push)
    # but was deleted WITHOUT ever opening/closing a PR — no close event
    # ever fires, so its container would otherwise run forever. Also a
    # belt-and-suspenders for merged PRs (the branch delete that usually
    # follows a merge re-triggers teardown idempotently).
    delete:
    workflow_dispatch:
        inputs:
            branch:
                description: 'Branch to deploy as preview'
                required: true

permissions:
    contents: read
    packages: write   # push to ghcr.io

# Serialize all runs that touch the same preview slug. Without this,
# a push-triggered `deploy` and a merge-triggered `teardown` can run
# on parallel runners and race on the host — if teardown's SSH lands
# after deploy's SSH, the container is correctly removed; if it lands
# before, the deploy recreates a zombie preview that nothing will
# clean up (the teardown workflow only fires on `pull_request: closed`,
# which has already fired).
#
# Keying on head_ref (PRs) / ref_name (push, workflow_dispatch) matches
# the slug derivation below — runs for the same branch queue, runs for
# different branches stay parallel. `cancel-in-progress: false` so an
# in-flight deploy completes before teardown starts, rather than being
# killed mid-build and leaving partial state on GHCR or the host.
concurrency:
    group: deploy-preview-${{ github.event.pull_request.head.ref || github.event.inputs.branch || github.event.ref || github.ref_name }}
    cancel-in-progress: false

jobs:
    # Deploy on push to a feature branch (or workflow_dispatch). NOT on
    # pull_request (closed → teardown) or delete (branch gone → teardown).
    deploy:
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-24.04
        steps:
            -   name: Checkout code
                uses: actions/checkout@v4
                with:
                    ref: ${{ github.event.inputs.branch || github.ref }}

            -   name: Derive slug from branch name
                id: slug
                # Branch may contain uppercase or unicode (e.g. 877-možnost-...).
                # The deploy script accepts ^[a-z0-9][a-z0-9-]{0,29}$ — so we
                # lowercase, strip non-alphanumeric to hyphens, trim leading/
                # trailing hyphens, and cap at 30 chars. If the resulting slug
                # is empty (e.g. branch was all-special-chars), fall back to
                # the short SHA to keep the URL stable.
                run: |
                    raw="${{ github.event.inputs.branch || github.ref_name }}"
                    slug=$(echo -n "$raw" \
                        | iconv -f UTF-8 -t ASCII//TRANSLIT//IGNORE \
                        | tr '[:upper:]' '[:lower:]' \
                        | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//' \
                        | cut -c1-30 \
                        | sed -E 's/-+$//')
                    if [ -z "$slug" ]; then
                        slug="sha-${GITHUB_SHA::8}"
                    fi
                    sha7="${GITHUB_SHA::7}"
                    echo "slug=$slug" >> "$GITHUB_OUTPUT"
                    echo "sha7=$sha7" >> "$GITHUB_OUTPUT"
                    echo "Deploying as: $slug ($sha7)"

            -   name: Log in to GHCR
                uses: docker/login-action@v3
                with:
                    registry: ghcr.io
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}

            -   name: Set up Docker Buildx
                uses: docker/setup-buildx-action@v3

            -   name: Build + push preview image
                # Two tags pushed per build:
                #   preview-<slug>            — rolling "latest for this slug"
                #   preview-<slug>-<sha7>     — immutable, points at exactly
                #                                this commit's image
                # The deploy step always references the SHA-pinned tag, so
                # the server can never accidentally use a stale image even
                # if a pull-fallback path runs against a cached layer.
                uses: docker/build-push-action@v6
                with:
                    context: .
                    file: Dockerfile.preview
                    push: true
                    tags: |
                        ghcr.io/${{ github.repository_owner }}/gamecon:preview-${{ steps.slug.outputs.slug }}
                        ghcr.io/${{ github.repository_owner }}/gamecon:preview-${{ steps.slug.outputs.slug }}-${{ steps.slug.outputs.sha7 }}
                    # Basic-auth creds + gate-token signing secrets for the
                    # Caddy gate in front of preview / archive envs. Baked into
                    # the image so the admin's dev rozcestník in the preview
                    # renders links identically to ostra (clean URL + copyable
                    # creds, and a signed ?gate= token for one-click access).
                    # These are access-control secrets shared across all
                    # previews (not user data) — fine to bake. GHCR repo is
                    # private.
                    build-args: |
                        PREVIEW_BASIC_AUTH_USER=${{ secrets.PREVIEW_BASIC_AUTH_USER }}
                        PREVIEW_BASIC_AUTH_PASSWORD=${{ secrets.PREVIEW_BASIC_AUTH_PASSWORD }}
                        ARCHIVE_BASIC_AUTH_USER=${{ secrets.ARCHIVE_BASIC_AUTH_USER }}
                        ARCHIVE_BASIC_AUTH_PASSWORD=${{ secrets.ARCHIVE_BASIC_AUTH_PASSWORD }}
                        PREVIEW_GATE_SECRET=${{ secrets.PREVIEW_GATE_SECRET }}
                        ARCHIVE_GATE_SECRET=${{ secrets.ARCHIVE_GATE_SECRET }}
                    # Reuse layers across preview builds — composer + yarn
                    # layers in particular are slow to rebuild.
                    cache-from: type=gha,scope=preview
                    cache-to: type=gha,scope=preview,mode=max

            -   name: Set up SSH
                # GAMECON_DEPLOY_SSH_KEY: private SSH key authorized on
                # gamecon.cz with a forced command restricting it to
                # /usr/local/sbin/deploy-preview-branch.sh.
                env:
                    SSH_KEY: ${{ secrets.GAMECON_DEPLOY_SSH_KEY }}
                    SSH_KNOWN_HOSTS: ${{ secrets.GAMECON_KNOWN_HOSTS }}
                run: |
                    mkdir -p ~/.ssh
                    echo "$SSH_KEY" > ~/.ssh/id_ed25519
                    chmod 0600 ~/.ssh/id_ed25519
                    echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
                    chmod 0644 ~/.ssh/known_hosts

            -   name: Trigger deploy on gamecon.cz
                # The deploy script reads stdin for a GHCR token used to
                # `docker login` before pulling the (private) preview image
                # and `docker logout` after. We forward GITHUB_TOKEN — it
                # already has read:packages for this repo (granted by the
                # workflow's `permissions: packages: write`) and dies with
                # the workflow run. Nothing persists on the host.
                env:
                    GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                run: |
                    # Reference the SHA-pinned tag (not the rolling slug
                    # tag) so the deploy is guaranteed to be this commit's
                    # build. If the script falls back to a cached image,
                    # it can only ever match this exact commit.
                    image="ghcr.io/${{ github.repository_owner }}/gamecon:preview-${{ steps.slug.outputs.slug }}-${{ steps.slug.outputs.sha7 }}"
                    echo "$GHCR_TOKEN" | ssh -o StrictHostKeyChecking=yes root@gamecon.cz \
                        "/usr/local/sbin/deploy-preview-branch.sh '${{ steps.slug.outputs.slug }}' '$image'"

            -   name: Output preview URL
                run: |
                    echo "::notice::Preview at https://${{ steps.slug.outputs.slug }}.preview.gamecon.cz/"

    # Tear down the preview when its PR closes (merged or abandoned) OR when
    # the branch is deleted. The two triggers overlap for the common
    # merge-then-delete flow (teardown is idempotent — `--remove` of an
    # already-gone preview is a no-op), and between them they close the gap:
    # a branch deleted without a PR fires `delete` but never `pull_request`.
    # Skip the `delete` of a tag (only branches get previews).
    teardown:
        if: >-
            (github.event_name == 'pull_request' && github.event.action == 'closed') ||
            (github.event_name == 'delete' && github.event.ref_type == 'branch')
        runs-on: ubuntu-24.04
        steps:
            -   name: Derive slug from branch name
                id: slug
                # pull_request: branch is head.ref; delete: branch is event.ref.
                run: |
                    raw="${{ github.event.pull_request.head.ref || github.event.ref }}"
                    slug=$(echo -n "$raw" \
                        | iconv -f UTF-8 -t ASCII//TRANSLIT//IGNORE \
                        | tr '[:upper:]' '[:lower:]' \
                        | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//' \
                        | cut -c1-30 \
                        | sed -E 's/-+$//')
                    # Empty slug = branch name was all special chars. On a
                    # closed PR we can reconstruct the same sha-fallback the
                    # deploy used; on a delete event there is no SHA to
                    # reconstruct from, so leave it empty and skip teardown
                    # (nothing reliable to target).
                    if [ -z "$slug" ]; then
                        sha="${{ github.event.pull_request.head.sha }}"
                        if [ -n "$sha" ]; then
                            slug="sha-${sha}"
                            slug="${slug:0:12}"
                        fi
                    fi
                    echo "slug=$slug" >> "$GITHUB_OUTPUT"

            -   name: Set up SSH
                env:
                    SSH_KEY: ${{ secrets.GAMECON_DEPLOY_SSH_KEY }}
                    SSH_KNOWN_HOSTS: ${{ secrets.GAMECON_KNOWN_HOSTS }}
                run: |
                    mkdir -p ~/.ssh
                    echo "$SSH_KEY" > ~/.ssh/id_ed25519
                    chmod 0600 ~/.ssh/id_ed25519
                    echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
                    chmod 0644 ~/.ssh/known_hosts

            -   name: Tear down preview on gamecon.cz
                # Skip when slug is empty (delete event for an all-special-char
                # branch name — no reliable target). Normal slugs always run.
                if: steps.slug.outputs.slug != ''
                run: |
                    ssh -o StrictHostKeyChecking=yes root@gamecon.cz \
                        "/usr/local/sbin/deploy-preview-branch.sh --remove '${{ steps.slug.outputs.slug }}'"
