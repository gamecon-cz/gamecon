name: Deploy year archive

# yamllint disable-line rule:truthy
on:
    # Auto-deploy on every push to an archive branch: pushing a fix to
    # archive/YYYY redeploys that year's site so the change goes live
    # without a manual dispatch. Branch shape is validated in the
    # "Derive year" step (anything not archive/YYYY[-suffix] fails there).
    push:
        branches:
            - 'archive/**'
    # Manual trigger kept for backfills / redeploying a specific commit.
    workflow_dispatch:
        inputs:
            branch:
                description: 'archive/YYYY or archive/YYYY-<suffix> branch (e.g. archive/2024, archive/2024-test)'
                required: true

permissions:
    contents: read
    packages: write   # push to ghcr.io

# Serialize deploys of the same archive branch. With push auto-deploy a
# burst of commits could otherwise launch overlapping runs that race to
# build + SSH-deploy the same year on the host. Newer push wins; we
# don't cancel an in-flight run mid-deploy (let it finish cleanly).
concurrency:
    group: deploy-year-archive-${{ github.event.inputs.branch || github.ref_name }}
    cancel-in-progress: false

jobs:
    deploy:
        runs-on: ubuntu-24.04
        steps:
            -   name: Checkout archive branch
                uses: actions/checkout@v4
                with:
                    # workflow_dispatch supplies the branch as an input;
                    # push supplies it as github.ref_name. Coalesce to one.
                    ref: ${{ github.event.inputs.branch || github.ref_name }}

            -   name: Derive year from branch name + sha from checked-out HEAD
                id: year
                # Branch shape: archive/<4 digits> for the canonical archive
                # branch, or archive/<4 digits>-<suffix> for test/scratch
                # variants (archive/2024-test, archive/2024-dbg, …). The
                # year is taken from the digits; suffix is ignored, so a
                # test branch deploys with the same image tag base and the
                # same host-side cmd as the real branch. Anything else is
                # rejected so we don't accidentally build an image from
                # an unrelated branch via a workflow_dispatch typo.
                #
                # sha7 comes from the actual checked-out HEAD (the input
                # branch), not from GITHUB_SHA. workflow_dispatch invoked
                # with --ref main pins GITHUB_SHA to main's HEAD, which
                # would tag the archive image with main's commit even
                # though its content comes from the archive branch.
                run: |
                    branch="${{ github.event.inputs.branch || github.ref_name }}"
                    if [[ ! "$branch" =~ ^archive/([0-9]{4})(-[a-z0-9-]+)?$ ]]; then
                        echo "::error::Branch '$branch' does not match archive/YYYY[-suffix]" >&2
                        exit 1
                    fi
                    year="${BASH_REMATCH[1]}"
                    if (( year < 2010 || year > 2099 )); then
                        echo "::error::Year $year outside supported range 2010..2099" >&2
                        exit 1
                    fi
                    sha7=$(git rev-parse --short=7 HEAD)

                    # Per-year base image map. Older years' code predates
                    # PHP 8.1/8.2 deprecations (the app's error handler
                    # escalates any deprecation to a fatal 500), so they must
                    # build on a period-correct PHP. We use the official,
                    # publicly-pullable php:<ver>-apache images directly —
                    # Dockerfile.archive's setup block installs the needed
                    # extensions on a bare base — so no custom base image /
                    # registry is involved. Default (unlisted years) = the
                    # gameconcz/gamecon:8.2 image baked into Dockerfile.archive.
                    # Add a row when a year's PHP era is confirmed during recon.
                    case "$year" in
                        # 2010 and 2011 are STATIC archives (the live DB +
                        # router are lost) — flat HTML reconstructed from the
                        # Internet Archive. Any base works; php:5.6-apache
                        # matches their neighbours and stays lightweight (no
                        # PHP executes).
                        2010) base_image="php:5.6-apache" ;;
                        2011) base_image="php:5.6-apache" ;;
                        2012) base_image="php:5.6-apache" ;;
                        2013) base_image="php:5.6-apache" ;;
                        2014) base_image="php:5.6-apache" ;;
                        2015) base_image="php:5.6-apache" ;;
                        2016) base_image="php:5.6-apache" ;;
                        2017) base_image="php:5.6-apache" ;;
                        2018) base_image="php:5.6-apache" ;;
                        2019) base_image="php:7.3-apache" ;;
                        2020) base_image="php:7.3-apache" ;;
                        2021) base_image="php:7.3-apache" ;;
                        *)    base_image="gameconcz/gamecon:8.2" ;;
                    esac

                    # PHP extensions to install on a bare base. Defaults to the
                    # modern set; very old years that run on an EOL Debian base
                    # (whose apt repos are gone) need a trimmed list so the
                    # Dockerfile's apt step is skipped. 2016-2018 (PHP 5.6) need
                    # only mysqli; 2015 and older use the even-older mysql_*
                    # extension (mysql, removed in PHP 7 but installable on 5.6).
                    # Both build with no apt packages.
                    case "$year" in
                        # 2010 and 2011 static archives need no PHP extension
                        # at all (no DB, no dynamic code) — empty list skips
                        # the Dockerfile's whole install step.
                        2010) php_exts="" ;;
                        2011) php_exts="" ;;
                        2012) php_exts="mysql" ;;
                        2013) php_exts="mysql" ;;
                        2014) php_exts="mysql" ;;
                        2015) php_exts="mysql" ;;
                        2016) php_exts="mysqli" ;;
                        2017) php_exts="mysqli" ;;
                        2018) php_exts="mysqli" ;;
                        *)    php_exts="mysqli pdo_mysql intl exif bcmath gd" ;;
                    esac

                    echo "year=$year" >> "$GITHUB_OUTPUT"
                    echo "sha7=$sha7" >> "$GITHUB_OUTPUT"
                    echo "base_image=$base_image" >> "$GITHUB_OUTPUT"
                    echo "php_exts=$php_exts" >> "$GITHUB_OUTPUT"
                    echo "Deploying year $year ($sha7) on base $base_image (exts: $php_exts)"

            -   name: Log in to GHCR
                uses: docker/login-action@v3
                with:
                    registry: ghcr.io
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}

            -   name: Set up Docker Buildx
                uses: docker/setup-buildx-action@v3

            -   name: Build + push archive image
                # Two tags pushed per build:
                #   archive-<year>            — rolling "latest for this year"
                #   archive-<year>-<sha7>     — immutable, points at exactly
                #                                this commit's image
                # The deploy step always references the SHA-pinned tag, so
                # the server can never accidentally use a stale image if a
                # pull-fallback path runs against a cached layer.
                uses: docker/build-push-action@v6
                with:
                    context: .
                    file: Dockerfile.archive
                    push: true
                    tags: |
                        ghcr.io/${{ github.repository_owner }}/gamecon:archive-${{ steps.year.outputs.year }}
                        ghcr.io/${{ github.repository_owner }}/gamecon:archive-${{ steps.year.outputs.year }}-${{ steps.year.outputs.sha7 }}
                    # Basic-auth creds + gate-token signing secrets for the
                    # Caddy gate in front of preview / archive envs. Baked into
                    # the image so the admin's dev rozcestník in the archive
                    # renders links identically to ostra (clean URL + copyable
                    # creds, and a signed ?gate= token for one-click access).
                    # These are access-control secrets shared across all
                    # archives (not user data) — fine to bake. GHCR repo is
                    # private.
                    build-args: |
                        BASE_IMAGE=${{ steps.year.outputs.base_image }}
                        PHP_EXTS=${{ steps.year.outputs.php_exts }}
                        PREVIEW_BASIC_AUTH_USER=${{ secrets.PREVIEW_BASIC_AUTH_USER }}
                        PREVIEW_BASIC_AUTH_PASSWORD=${{ secrets.PREVIEW_BASIC_AUTH_PASSWORD }}
                        ARCHIVE_BASIC_AUTH_USER=${{ secrets.ARCHIVE_BASIC_AUTH_USER }}
                        ARCHIVE_BASIC_AUTH_PASSWORD=${{ secrets.ARCHIVE_BASIC_AUTH_PASSWORD }}
                        PREVIEW_GATE_SECRET=${{ secrets.PREVIEW_GATE_SECRET }}
                        ARCHIVE_GATE_SECRET=${{ secrets.ARCHIVE_GATE_SECRET }}
                    # Reuse layers across archive builds. Heavy layers
                    # (apt + pecl from the base) come from the base image
                    # so the gha cache mostly helps with the COPY layer
                    # invalidation across closely-related archive
                    # branches.
                    cache-from: type=gha,scope=archive
                    cache-to: type=gha,scope=archive,mode=max

            -   name: Set up SSH
                # GAMECON_DEPLOY_SSH_KEY: private SSH key authorized on
                # gamecon.cz with a forced command (ci-preview-wrapper)
                # that allowlists deploy-preview-branch.sh AND
                # deploy-year-archive.sh.
                env:
                    SSH_KEY: ${{ secrets.GAMECON_DEPLOY_SSH_KEY }}
                    SSH_KNOWN_HOSTS: ${{ secrets.GAMECON_KNOWN_HOSTS }}
                run: |
                    mkdir -p ~/.ssh
                    echo "$SSH_KEY" > ~/.ssh/id_ed25519
                    chmod 0600 ~/.ssh/id_ed25519
                    echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
                    chmod 0644 ~/.ssh/known_hosts

            -   name: Trigger deploy on gamecon.cz
                # The deploy script reads stdin for a GHCR token used to
                # docker login before pulling the (private) archive image
                # and docker logout after. GITHUB_TOKEN already has
                # read:packages for this repo (granted by the workflow's
                # `permissions: packages: write`) and dies with the
                # workflow run. Nothing persists on the host.
                #
                # Reference the SHA-pinned tag (not the rolling year tag)
                # so the deploy is guaranteed to be this commit's build.
                # If the script falls back to a cached image, it can
                # only ever match this exact commit.
                env:
                    GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                run: |
                    image="ghcr.io/${{ github.repository_owner }}/gamecon:archive-${{ steps.year.outputs.year }}-${{ steps.year.outputs.sha7 }}"
                    echo "$GHCR_TOKEN" | ssh -o StrictHostKeyChecking=yes root@gamecon.cz \
                        "/usr/local/sbin/deploy-year-archive.sh '${{ steps.year.outputs.year }}' '$image'"

            -   name: Output archive URL
                run: |
                    echo "::notice::Archive deployed at https://${{ steps.year.outputs.year }}.gamecon.cz/"
