# Honor the X-Forwarded-Proto header from the upstream proxy chain
# (HAProxy → Caddy → this container). Without this, PHP code that
# checks $_SERVER['HTTPS'] (e.g. nastaveni-local-default.php's $baseUrl,
# Tracy's URL helpers, jwt-bridge cookie flags) treats every request
# as plain HTTP and emits http:// URLs in <base href> etc.
#
# Sourcing the value from a header is safe in this deployment because:
#   1. The container's :80 is only reachable via 127.0.0.1 on the host
#      (deploy script uses `-p 127.0.0.1::80`), so the only client that
#      can ever set this header is Caddy.
#   2. Caddy strips/replaces inbound X-Forwarded-* headers by default
#      when reverse-proxying, so a client cannot forge the value.
SetEnvIf X-Forwarded-Proto "^https$" HTTPS=on
