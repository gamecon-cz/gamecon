parameters:
    # Database configuration - read from env vars set by legacy zavadec-zaklad.php
    gamecon.db.host: '%env(GAMECON_DB_HOST)%'
    gamecon.db.port: '%env(int:GAMECON_DB_PORT)%'
    gamecon.db.name: '%env(GAMECON_DB_NAME)%'
    gamecon.db.user: '%env(GAMECON_DB_USER)%'
    gamecon.db.password: '%env(GAMECON_DB_PASSWORD)%'
    app.secret: '%env(APP_SECRET)%'
    app.legacy_cache_dir: '%env(LEGACY_CACHE_DIR)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            $projectDir: '%kernel.project_dir%'

    App\:
        resource: '../src/'
        exclude:
            - '../src/Kernel.php'
            - '../src/Entity/'
            - '../src/DependencyInjection/'

    # Legacy integration services
    legacy.session:
        class: 'App\Service\LegacySessionService'
        public: true

    app.clock:
        decorates: 'clock'
        parent: 'clock'
        public: true

    # UserRoleService - accessed from legacy code via container
    App\Service\UserRoleService:
        public: true

    # CurrentYearProvider
    App\Service\CurrentYearProviderInterface:
        class: App\Service\CurrentYearProvider

    # JWT service for cross-app authentication
    App\Service\JwtService:
        public: true
        arguments:
            $secret: '%app.secret%' # Use the same secret as Symfony app
            $legacyCacheDir: '%app.legacy_cache_dir%' # Use cache directory that both apps can access
