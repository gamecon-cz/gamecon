parameters:
    # Database configuration - matches legacy nastaveni-local-docker_default.php
    # These are hardcoded to match the Docker Compose setup
    gamecon.db.host: 'sql.gamecon'  # Docker network alias for MariaDB
    gamecon.db.port: 3306
    gamecon.db.name: 'gamecon'
    gamecon.db.user: 'root'
    gamecon.db.password: 'root'
    app.secret: '%env(APP_SECRET)%'
    app.legacy_cache_dir: '%env(LEGACY_CACHE_DIR)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            $projectDir: '%kernel.project_dir%'

    App\:
        resource: '../src/'
        exclude:
            - '../src/Kernel.php'
            - '../src/Entity/'
            - '../src/DependencyInjection/'

    # Legacy integration services
    legacy.session:
        class: 'App\Service\LegacySessionService'
        public: true

    app.clock:
        decorates: 'clock'
        parent: 'clock'
        public: true

    # JWT service for cross-app authentication
    App\Service\JwtService:
        public: true
        arguments:
            $secret: '%app.secret%' # Use the same secret as Symfony app
            $legacyCacheDir: '%app.legacy_cache_dir%' # Use cache directory that both apps can access
